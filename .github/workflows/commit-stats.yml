name: Update Total Commits

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-total-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Get total commits by author (global)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: AdamRezaJames
        run: |
          set -euo pipefail

          # GitHub Search API for commits (global by author)
          # We use per_page=1 because we only need total_count
          API_URL="https://api.github.com/search/commits?q=author:${USERNAME}&per_page=1"

          RESPONSE=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$API_URL")

          TOTAL=$(echo "$RESPONSE" | jq -r '.total_count')

          mkdir -p data
          echo "$TOTAL" > data/total_commits.txt

          echo "Total commits for ${USERNAME}: $TOTAL"

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/total_commits.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update total commits"
          git push
